name: Daily Debrief — Hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-debrief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run debrief
        env:
          GMAIL_USER_1:   ${{ secrets.GMAIL_USER_1 }}
          GMAIL_PASS_1:   ${{ secrets.GMAIL_PASS_1 }}
          GMAIL_USER_2:   ${{ secrets.GMAIL_USER_2 }}
          GMAIL_PASS_2:   ${{ secrets.GMAIL_PASS_2 }}
          YAHOO_USER:     ${{ secrets.YAHOO_USER }}
          YAHOO_PASS:     ${{ secrets.YAHOO_PASS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and push index.html
        run: |
          git config user.name  "Debrief Bot"
          git config user.email "bot@debrief.local"
          git add index.html
          git diff --staged --quiet || git commit -m "Debrief update $(date +'%Y-%m-%d %H:%M UTC')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
